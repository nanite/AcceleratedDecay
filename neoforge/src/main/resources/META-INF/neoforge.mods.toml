modLoader = "javafml"
loaderVersion = "[4,)"
issueTrackerURL = "https://github.com/Nanite/AcceleratedDecay/issues"
license = "GPL3"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "Accelerated Decay"
authors = "ErrorMikey"
description = '''
Speeds up the decay of leaves
'''
#logoFile = ""

[[dependencies.${mod_id}]]
modId = "neoforge"
required = true
versionRange = "${neoforge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
required = true
versionRange = "${minecraft_version_range_maven}"
ordering = "NONE"
side = "BOTH"

[[mixins]]
config = "accelerateddecay.mixins.json"
